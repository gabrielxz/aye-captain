<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AYE CAPTAIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #06090d;
      --panel: #0b1118;
      --line: #1c2a38;
      --fg: #c8d6e5;
      --dim: #5c7185;
      --accent: #4fd1c5;
      --warn: #f6ad55;
      --danger: #fc8181;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---------- lobby ---------- */
    #lobby {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    #lobby h1 { font-size: 28px; letter-spacing: 8px; color: var(--accent); font-weight: normal; }
    #lobby .sub { color: var(--dim); margin-bottom: 12px; }
    #lobby button {
      background: none; border: 1px solid var(--line); color: var(--fg);
      font: inherit; padding: 10px 26px; cursor: pointer; min-width: 260px;
      letter-spacing: 2px;
    }
    #lobby button:hover { border-color: var(--accent); color: var(--accent); }
    #lobby input {
      background: var(--panel); border: 1px solid var(--line); color: var(--fg);
      font: inherit; padding: 10px; width: 120px; text-align: center;
      text-transform: uppercase; letter-spacing: 4px;
    }
    #lobby .join-row { display: flex; gap: 8px; }
    #lobby .join-row button { min-width: 100px; }
    #lobby-status { color: var(--warn); min-height: 1.2em; }
    /* v5 room lobby */
    #room-panel { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    #room-panel .room-code { font-size: 22px; letter-spacing: 6px; color: var(--accent); }
    #room-roster { display: flex; flex-direction: column; gap: 3px; min-width: 240px; }
    #room-roster .seat { display: flex; justify-content: space-between; gap: 16px; padding: 3px 8px; border: 1px solid #223; }
    #room-roster .seat .you { color: var(--accent); }
    #room-roster .seat .team-red { color: #e07a7a; }
    #room-roster .seat .team-blue { color: #7ab0e0; }
    #room-controls { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    #mode-row button.active, #team-row button.active, #arch-row button.active { border-color: var(--accent); color: var(--accent); }
    #mode-row, #team-row, #arch-row { display: flex; gap: 8px; }

    /* ---------- game ---------- */
    #game { flex: 1; display: none; min-height: 0; }
    #game.active { display: flex; }

    #map-wrap { flex: 1; position: relative; min-width: 0; }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    #side {
      width: 380px; display: flex; flex-direction: column;
      border-left: 1px solid var(--line); background: var(--panel);
    }

    #topbar {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-bottom: 1px solid var(--line); color: var(--dim); font-size: 11px;
    }
    #topbar input[type="range"] {
      width: 90px; accent-color: var(--accent); height: 2px;
    }
    #controls-hint { flex: 1; letter-spacing: 0.5px; }
    .verbosity-btn {
      background: none; border: 1px solid var(--line); color: var(--dim);
      font: inherit; font-size: 10px; padding: 2px 8px; cursor: pointer;
      letter-spacing: 1px;
    }
    .verbosity-btn:hover { border-color: var(--accent); color: var(--accent); }

    #hud {
      border-bottom: 1px solid var(--line); padding: 8px 10px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 3px 14px;
      color: var(--dim); line-height: 1.5;
    }
    #hud .v { color: var(--fg); }
    #hud .v.good { color: var(--accent); }
    #hud .v.warn { color: var(--warn); }
    #hud .v.alert { color: var(--danger); animation: hud-blink 0.9s step-start infinite; }
    #hud .full { grid-column: 1 / -1; }
    @keyframes hud-blink { 50% { opacity: 0.4; } }
    #hud .bar {
      display: inline-block; vertical-align: middle; width: 64px; height: 7px;
      background: rgba(255,255,255,0.08); border: 1px solid var(--line);
    }
    #hud .bar i {
      display: block; height: 100%; background: var(--accent);
      transition: width 0.9s linear, background-color 0.5s;
    }
    #hud .bar i.warn { background: var(--warn); }
    #hud .bar i.alert { background: var(--danger); }

    #transcript {
      flex: 1; overflow-y: auto; padding: 10px; line-height: 1.5;
      scrollbar-width: thin; scrollbar-color: var(--line) transparent;
    }
    #transcript .entry { margin-bottom: 4px; word-wrap: break-word; }
    #transcript .who { color: var(--dim); }
    #transcript .capt .who { color: var(--accent); }
    #transcript .xo .who { color: var(--warn); }
    #transcript .xo-note { color: var(--dim); font-style: italic; }
    #transcript .xo-note .who { color: var(--dim); font-style: normal; }
    #transcript .sys { color: var(--dim); font-style: italic; }
    #transcript .comms { color: #9ad1ff; }
    #transcript .comms .who { color: #5a8fc0; }
    #transcript .sys.alert { color: var(--danger); font-style: normal; }

    #cmd-row { border-top: 1px solid var(--line); display: flex; align-items: center; }
    #cmd-prompt { padding: 10px 0 10px 10px; color: var(--accent); }
    #cmd {
      flex: 1; background: none; border: none; outline: none;
      color: var(--fg); font: inherit; padding: 10px;
    }
    /* mobile push-to-talk: keyboards have Space; thumbs get a button.
       Shown only on coarse pointers (phones/tablets). */
    #ptt {
      display: none; margin: 6px 0 6px 8px; padding: 10px 14px;
      background: none; border: 1px solid var(--line); color: var(--accent);
      font: inherit; letter-spacing: 1px; cursor: pointer;
      touch-action: none; -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    #ptt.listening { border-color: var(--danger); color: var(--danger); animation: mic-blink 1.2s step-start infinite; }
    @media (pointer: coarse) { #ptt { display: block; } }
    #mic { display: none; padding-right: 10px; color: var(--danger); letter-spacing: 1px; }
    #mic.listening { display: block; animation: mic-blink 1.2s step-start infinite; }
    #mic.transcribing { display: block; color: var(--dim); }
    @keyframes mic-blink { 50% { opacity: 0.35; } }

    #banner {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(6, 9, 13, 0.85); gap: 14px; text-align: center;
    }
    #banner.active { display: flex; }
    #banner h2 { font-size: 26px; letter-spacing: 6px; font-weight: normal; }
    #banner .detail { color: var(--dim); }
    #banner .banner-buttons { display: flex; gap: 10px; }
    #banner button {
      background: none; border: 1px solid var(--line); color: var(--fg);
      font: inherit; padding: 8px 22px; cursor: pointer; letter-spacing: 2px;
    }
    #banner button:hover { border-color: var(--accent); color: var(--accent); }
    #banner-howto {
      color: var(--dim); text-decoration: none; font-size: 12px; letter-spacing: 2px;
    }
    #banner-howto:hover { color: var(--accent); }

    /* ---------- spectator presence (v4.2) ---------- */
    /* players: quiet watcher roster, top-left (opposite the HUD panel) */
    #watching {
      position: absolute; top: 10px; left: 12px; display: none;
      color: var(--dim); font-size: 11px; letter-spacing: 1px;
      background: rgba(6, 9, 13, 0.55); padding: 3px 8px;
      pointer-events: none;
    }
    /* spectators: own-callsign badge, top center of the map */
    #spec-badge {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      display: none; color: var(--accent); font-size: 12px; letter-spacing: 2px;
      border: 1px solid var(--line); background: rgba(11, 17, 24, 0.7);
      padding: 4px 14px; pointer-events: none;
    }
    /* spectators can't give orders or call rematches */
    body.spectating #cmd-row { display: none; }
    body.spectating .banner-buttons { display: none; }
  </style>
</head>
<body>
  <div id="lobby">
    <h1>AYE CAPTAIN</h1>
    <div class="sub">voice-commanded space combat &mdash; type or hold space to talk</div>
    <button id="btn-create">CREATE MATCH</button>
    <div class="join-row">
      <input id="join-code" maxlength="4" placeholder="CODE" autocomplete="off" />
      <button id="btn-join">JOIN</button>
      <button id="btn-watch">WATCH</button>
    </div>
    <button id="btn-practice">PRACTICE</button>
    <button id="btn-howto">HOW TO PLAY</button>
    <div class="sub" style="margin-top:8px">
      XO voice: <button id="verbosity-lobby" class="verbosity-btn">FULL</button>
    </div>
    <div id="lobby-status"></div>

    <!-- v5 §2: room lobby — roster, mode toggle, team picks, launch -->
    <div id="room-panel" style="display:none">
      <div id="room-code" class="room-code"></div>
      <div id="room-roster"></div>
      <div id="room-controls">
        <div id="arch-row">
          <button id="btn-arch-corvette" data-arch="corvette" title="the ghost — dim, fast, best eyes, no railgun">CORVETTE</button>
          <button id="btn-arch-frigate" data-arch="frigate" title="the baseline — balanced loadout, one railgun">FRIGATE</button>
          <button id="btn-arch-cruiser" data-arch="cruiser" title="the thunderstorm — heavy hull, deep magazines, always audible">CRUISER</button>
        </div>
        <div id="mode-row" style="display:none">
          <button id="btn-mode-ffa">FFA</button>
          <button id="btn-mode-teams">TEAMS</button>
        </div>
        <div id="team-row" style="display:none">
          <button id="btn-team-red">JOIN RED</button>
          <button id="btn-team-blue">JOIN BLUE</button>
        </div>
        <button id="btn-launch" style="display:none">LAUNCH</button>
      </div>
      <div id="room-hint" class="sub"></div>
    </div>
  </div>

  <div id="game">
    <div id="map-wrap">
      <canvas id="map"></canvas>
      <div id="watching"></div>
      <div id="spec-badge"></div>
      <div id="banner">
        <h2 id="banner-title"></h2>
        <div class="detail" id="banner-detail"></div>
        <div class="banner-buttons">
          <button id="btn-rematch">REMATCH — SAME FIELD</button>
          <button id="btn-rematch-new">REMATCH — NEW FIELD</button>
        </div>
        <a id="banner-howto" href="/how-to-play" target="_blank" rel="noopener">HOW TO PLAY &nearr;</a>
      </div>
    </div>
    <div id="side">
      <div id="topbar">
        <span id="controls-hint">ENTER type &middot; SPACE talk &middot; WHEEL zoom &middot; DRAG/WASD pan &middot; F follow &middot; M map &middot; V vector</span>
        <span>SFX</span>
        <input type="range" id="vol-sfx" min="0" max="1" step="0.05" style="width:64px" />
        <span>VOX</span>
        <input type="range" id="vol-voice" min="0" max="1" step="0.05" style="width:64px" />
        <button id="verbosity" class="verbosity-btn" title="XO verbosity — FULL: everything &middot; TERSE: warnings and news only &middot; SILENT: warnings only">XO: FULL</button>
      </div>
      <div id="hud"></div>
      <div id="transcript"></div>
      <div id="cmd-row">
        <button id="ptt" aria-label="hold to talk">🎙 HOLD</button>
        <span id="cmd-prompt">&gt;</span>
        <input id="cmd" autocomplete="off" spellcheck="false"
               placeholder="orders, captain? — ENTER to type, hold SPACE to talk" />
        <span id="mic">&#9679; REC</span>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
